<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Zynrax Panel</title>

<style>

body{
font-family:Arial;
padding:30px;
overflow-x:hidden;
margin:0;

/* ✅ เพิ่มพื้นหลังแดง */
background:linear-gradient(
180deg,
#990000 0%,
#d60000 50%,
#ff4040 100%
);
}

/* ✅ bgRed ใช้งานจริง */
#bgRed{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-2;

background:linear-gradient(
180deg,
#990000 0%,
#d60000 50%,
#ff4040 100%
);
}

#snowPanel{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
pointer-events:none;
}

/* panel อยู่หน้า canvas */

.login,
.panel{
position:relative;
z-index:1;
}

/* LOGIN */

.login{
max-width:400px;
margin:auto;
text-align:center;
padding-top:60px;
}

/* INPUT */

input,
textarea,
select{
width:100%;
padding:10px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;
transition:0.2s;
box-sizing:border-box;
}

/* FOCUS */

input:focus,
textarea:focus,
select:focus{

outline:none;

border-color:#d60000;

box-shadow:
0 0 0 3px rgba(214,0,0,0.2);

}

/* BUTTON */

button{
padding:10px 16px;
background:#d60000;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
font-weight:600;
}

button:hover{
opacity:0.85;
}

/* PANEL */

.panel{
display:none;
gap:26px;
align-items:flex-start;
}

/* LEFT */

.formBox{

width:320px;

flex-shrink:0;

position:sticky;
top:20px;

height:fit-content;

background:linear-gradient(
145deg,
#ffffff,
#f7f7f7
);

padding:20px;

border-radius:16px;

box-shadow:0 4px 14px rgba(0,0,0,0.06);

}

/* RIGHT */

.listBox{

flex:1;

background:linear-gradient(
145deg,
#ffffff,
#f3f3f3
);

padding:22px;

border-radius:18px;

box-shadow:
0 6px 18px rgba(0,0,0,0.06),
inset 0 1px 0 rgba(255,255,255,0.6);

}

/* CARD */

.card{

display:flex;
gap:14px;
align-items:flex-start;

background:white;

padding:14px;

border-radius:14px;

margin-top:14px;

box-shadow:0 4px 14px rgba(0,0,0,0.06);

transition:0.2s;

}

.card:hover{

transform:translateY(-2px);

box-shadow:0 6px 16px rgba(0,0,0,0.08);

}

.card img{

width:100px;
height:70px;

object-fit:cover;

border-radius:8px;

}

/* TRENDING */

.thumbBox{
position:relative;
}

.trendingBadge{

position:absolute;

top:6px;
right:6px;

background:#ff4040;

color:white;

font-size:12px;

padding:2px 6px;

border-radius:6px;

font-weight:bold;

}

/* FILTER */

#categoryFilter button.active{

background:#333;
color:white;

}

.sectionDivider{

border:none;

height:1px;

background:linear-gradient(
to right,
transparent,
#ddd,
transparent
);

margin:14px 0 18px;

}

#searchInput{

margin-top:6px;

margin-bottom:12px;

}

</style>

</head>
